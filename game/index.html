<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>节奏猎手</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- 主菜单 -->
    <div id="screen-start" class="screen active">
      <div class="content">
        <h1 class="game-title">节奏猎手</h1>
        <button id="btn-start" class="btn-primary">开始游戏</button><br>
        <button id="btn-howto" class="btn-secondary">游戏说明</button>
      </div>
    </div>

    <!-- 说明 -->
    <div id="screen-howto" class="screen">
      <div class="content" style="color:#fff; text-align:center;">
        <h2>游戏说明</h2>
        <p style="margin:20px 0;">点击屏幕上下方消灭怪物</p>
        <button id="btn-back" class="btn-secondary">返回</button>
      </div>
    </div>

    <!-- 游戏画布 -->
    <div id="screen-game" class="screen">
      <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 结算 -->
    <div id="screen-gameover" class="screen">
      <div class="content">
        <h2 style="color:red; font-size:2rem;">游戏结束</h2>
        <p>得分: <span id="final-score">0</span></p>
        <p>最高连击: <span id="final-combo">0</span></p>
        <button id="btn-restart" class="btn-primary">再来一局</button><br>
        <button id="btn-menu" class="btn-secondary">主菜单</button>
      </div>
    </div>

    <!-- Buff 三选一 -->
    <div id="buff-modal" class="screen">
      <div class="content">
        <h2 style="color:#ffd700;">击败 BOSS 奖励</h2>
        <div id="buff-cards"></div>
        <button id="btn-buff-confirm" class="btn-primary" disabled>确认选择</button>
      </div>
    </div>
  </div>

  <!-- 严格的脚本顺序 -->
  <script src="js/assetLoader.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/player.js"></script>
  <script src="js/monsters/normalMonster.js"></script>
  <script src="js/monsters/cloudMonster.js"></script>
  <script src="js/monsters/bossMonster.js"></script>
  <script src="js/ui.js"></script>
  <script src="buffManager.js"></script> <!-- 注意这里：如果他在js文件夹，记得改路径 -->
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
